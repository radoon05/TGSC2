<!DOCTYPE html>
<html dir="rtl" lang="fa">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدیریت تنظیمات اسکرپر</title>

    <!-- فونت وزیرمتن از CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" />

    <style>
        /* ===== ریست و پایه ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: #f0f4f9;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.08);
            padding: 32px 36px 42px;
            transition: all 0.2s;
        }

        /* ===== هدر ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 18px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            background: #2563eb;
            color: #fff;
            font-size: 20px;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .badge-status {
            background: #e6f7e6;
            color: #0b6e0b;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge-status .dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.8s infinite;
        }

        @keyframes pulse-dot {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.85);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== بخش تنظیمات ثابت ===== */
        .settings-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            background: #f8fafc;
            border-radius: 18px;
            padding: 22px 26px;
            margin-bottom: 32px;
            border: 1px solid #e9edf2;
        }

        .settings-row .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .settings-row .field label {
            font-weight: 600;
            font-size: 14px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-row .field label .icon {
            font-size: 20px;
        }

        .settings-row .field input {
            padding: 10px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Vazirmatn', sans-serif;
            transition: 0.2s;
            background: #fff;
            width: 100%;
        }

        .settings-row .field input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .settings-row .field .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* ===== دکمه‌های اقدام ===== */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 18px 0 28px;
        }

        .btn {
            padding: 11px 30px;
            border: none;
            border-radius: 40px;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-secondary {
            background: #e9edf2;
            color: #1e293b;
        }

        .btn-secondary:hover {
            background: #dce1e8;
        }

        .btn-success {
            background: #16a34a;
            color: #fff;
            box-shadow: 0 4px 14px rgba(22, 163, 74, 0.3);
        }

        .btn-success:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== هشدارها ===== */
        .alert {
            padding: 14px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            border-right: 5px solid;
        }

        .alert-success {
            display: flex;
            background: #ecfdf5;
            border-color: #16a34a;
            color: #065f46;
        }

        .alert-error {
            display: flex;
            background: #fef2f2;
            border-color: #dc2626;
            color: #991b1b;
        }

        .alert-info {
            display: flex;
            background: #eff6ff;
            border-color: #2563eb;
            color: #1e3a8a;
        }

        /* ===== لیست دسته‌بندی‌ها ===== */
        .categories-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 28px 0 16px;
        }

        .categories-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .categories-header .count-badge {
            background: #e9edf2;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #475569;
        }

        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        .category-item {
            display: grid;
            grid-template-columns: 1.8fr 0.8fr 0.9fr 0.2fr;
            align-items: center;
            gap: 12px;
            background: #fafcff;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            padding: 10px 18px;
            transition: 0.15s;
        }

        .category-item:hover {
            background: #f8faff;
            border-color: #cbd5e1;
        }

        .category-item .cat-name {
            font-weight: 600;
            color: #0f172a;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .category-item .cat-input-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .category-item .cat-input-group label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
            padding-right: 4px;
        }

        .category-item .cat-input-group input {
            padding: 6px 10px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            background: #fff;
            width: 100%;
            transition: 0.15s;
        }

        .category-item .cat-input-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
        }

        .category-item .cat-input-group input.coeff-input {
            width: 80px;
        }

        .category-item .cat-input-group input.prefix-input {
            width: 110px;
        }

        .category-item .cat-id-badge {
            font-size: 11px;
            color: #94a3b8;
            background: #f1f4f9;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ===== فوتر ===== */
        .footer {
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            color: #94a3b8;
            font-size: 14px;
        }

        .footer .last-updated {
            background: #f1f4f9;
            padding: 4px 16px;
            border-radius: 40px;
        }

        /* ===== واکنش‌گرا ===== */
        @media (max-width: 860px) {
            .container {
                padding: 20px 18px;
            }

            .settings-row {
                grid-template-columns: 1fr;
            }

            .category-item {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 16px;
            }

            .category-item .cat-name {
                white-space: normal;
            }

            .category-item .cat-input-group input.coeff-input,
            .category-item .cat-input-group input.prefix-input {
                width: 100%;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .action-bar .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 16px 12px;
                border-radius: 18px;
            }

            .header h1 {
                font-size: 20px;
            }

            .settings-row {
                padding: 16px;
            }
        }

        /* ===== اسکرول نرم ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f4f9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container" id="app">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>
                <span>⚙</span>
                مدیریت تنظیمات اسکرپر
            </h1>
            <div class="badge-status">
                <span class="dot"></span>
                اتصال برقرار
            </div>
        </div>

        <!-- ===== ALERT ===== -->
        <div id="alertBox" class="alert"></div>

        <!-- ===== تنظیمات ثابت ===== -->
        <div class="settings-row">
            <div class="field">
                <label>
                    <span class="icon">📦</span>
                    هزینه ثابت (بسته‌بندی / حمل)
                </label>
                <input type="number" id="fixedCost" step="1000" value="73000" />
                <span class="hint">به تومان • به مضرب ۱۰۰۰</span>
            </div>
            <div class="field">
                <label>
                    <span class="icon">🔢</span>
                    گرد کردن به مضرب
                </label>
                <input type="number" id="roundTo" step="1000" value="1000" />
                <span class="hint">مثلاً ۱۰۰۰ یا ۵۰۰۰ تومان</span>
            </div>
        </div>

        <!-- ===== دکمه‌های اقدام ===== -->
        <div class="action-bar">
            <button class="btn btn-success" onclick="saveSettings()">
                💾 ذخیره تمام تغییرات
            </button>
            <button class="btn btn-secondary" onclick="loadSettings()">
                🔄 بازخوانی از دیتابیس
            </button>
        </div>

        <!-- ===== دسته‌بندی‌ها ===== -->
        <div class="categories-header">
            <h2>📂 دسته‌بندی‌ها و ضرایب سود</h2>
            <span class="count-badge" id="catCount">۰ دسته</span>
        </div>

        <div id="categoriesContainer" class="category-grid">
            <!-- توسط JS پر می‌شود -->
            <div style="text-align:center; color:#94a3b8; padding:30px 0;">در حال بارگذاری...</div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="footer">
            <span>تغییرات پس از ذخیره در دیتابیس ثبت می‌شوند.</span>
            <span class="last-updated" id="lastUpdated">—</span>
        </div>
    </div>

    <script>
        // ============================================================
        //  متغیرهای سراسری
        // ============================================================
        let categoriesData = [];

        // ============================================================
        //  بارگذاری تنظیمات از سرور
        // ============================================================
        async function loadSettings() {
            showAlert('در حال دریافت داده‌ها...', 'info');
            try {
                const res = await fetch('/api/settings');
                if (!res.ok) throw new Error('خطا در دریافت داده');
                const data = await res.json();

                document.getElementById('fixedCost').value = data.fixedCost || 0;
                document.getElementById('roundTo').value = data.roundTo || 0;

                categoriesData = data.categories || [];
                renderCategories(categoriesData);
                document.getElementById('catCount').textContent = categoriesData.length + ' دسته';
                document.getElementById('lastUpdated').textContent = 'آخرین بروزرسانی: ' + new Date().toLocaleTimeString('fa-IR');

                hideAlert();
            } catch (err) {
                showAlert('❌ خطا در بارگذاری: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  رندر دسته‌بندی‌ها
        // ============================================================
        function renderCategories(categories) {
            const container = document.getElementById('categoriesContainer');
            if (!categories || categories.length === 0) {
                container.innerHTML = `<div style="...">هیچ دسته‌بندی ثبت نشده است.</div>`;
                return;
            }
            let html = '';
            categories.forEach((cat, index) => {
                const isPercent = cat.coefficientType === 'percent';
                html += `
            <div class="category-item" data-index="${index}">
                <div class="cat-name">${escapeHtml(cat.name)}</div>

                <div class="cat-input-group">
                    <label>نوع سود</label>
                    <select id="type_${index}" onchange="toggleCoeffFields(${index})">
                        <option value="percent" ${isPercent ? 'selected' : ''}>درصدی</option>
                        <option value="fixed" ${!isPercent ? 'selected' : ''}>ثابت (تومان)</option>
                    </select>
                </div>

                <div class="cat-input-group" id="percentGroup_${index}" style="${isPercent ? '' : 'display:none;'}">
                    <label>ضریب درصدی</label>
                    <input type="number" step="0.01" min="0.5" max="5" id="coeff_${index}" value="${cat.priceCoeff}" class="coeff-input" />
                </div>

                <div class="cat-input-group" id="fixedGroup_${index}" style="${!isPercent ? '' : 'display:none;'}">
                    <label>سود ثابت (تومان)</label>
                    <input type="number" step="1000" min="0" id="fixedProfit_${index}" value="${cat.fixedProfit || 0}" class="coeff-input" />
                </div>

                <div class="cat-input-group">
                    <label>پیشوند</label>
                    <input type="text" id="prefix_${index}" value="${escapeHtml(cat.titlePrefix || '')}" class="prefix-input" />
                </div>

                <input type="hidden" id="eways_${index}" value="${escapeHtml(cat.ewaysCatID)}" />
                <input type="hidden" id="wp_${index}" value="${cat.wpCatID}" />
                <input type="hidden" id="name_${index}" value="${escapeHtml(cat.name)}" />
            </div>
        `;
            });
            container.innerHTML = html;
        }

        // تابع برای تغییر نمایش فیلدها بر اساس انتخاب نوع
        function toggleCoeffFields(index) {
            const type = document.getElementById(`type_${index}`).value;
            const percentGroup = document.getElementById(`percentGroup_${index}`);
            const fixedGroup = document.getElementById(`fixedGroup_${index}`);
            if (type === 'percent') {
                percentGroup.style.display = 'block';
                fixedGroup.style.display = 'none';
            } else {
                percentGroup.style.display = 'none';
                fixedGroup.style.display = 'block';
            }
        }

        // ============================================================
        //  ذخیره تنظیمات
        // ============================================================
        async function saveSettings() {
            const fixedCost = parseFloat(document.getElementById('fixedCost').value) || 0;
            const roundTo = parseFloat(document.getElementById('roundTo').value) || 0;

            const categories = [];
            const items = document.querySelectorAll('#categoriesContainer .category-item');
            items.forEach((item) => {
                const index = item.dataset.index;
                const name = document.getElementById(`name_${index}`).value;
                const ewaysCatID = document.getElementById(`eways_${index}`).value;
                const wpCatID = parseInt(document.getElementById(`wp_${index}`).value) || 0;
                const priceCoeff = parseFloat(document.getElementById(`coeff_${index}`).value) || 1;
                const titlePrefix = document.getElementById(`prefix_${index}`).value.trim();
                const coefficientType = document.getElementById(`type_${index}`).value;
                const fixedProfit = parseFloat(document.getElementById(`fixedProfit_${index}`).value) || 0;

                categories.push({
                    name, ewaysCatID, wpCatID, priceCoeff, titlePrefix,
                    coefficientType, fixedProfit
                });
            });

            const payload = { fixedCost, roundTo, categories };

            showAlert('⏳ در حال ذخیره...', 'info');
            try {
                const res = await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'خطای ناشناخته');

                showAlert('✅ ' + (result.status || 'تنظیمات با موفقیت ذخیره شد'), 'success');
                await loadSettings(); // بارگذاری مجدد برای نمایش داده‌های به‌روز
            } catch (err) {
                showAlert('❌ خطا در ذخیره: ' + err.message, 'error');
            }
        }

        // ============================================================
        //  ابزارهای کمکی
        // ============================================================
        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = 'alert alert-' + type;
            box.style.display = 'flex';
            // تنظیم آیکون خودکار
            if (type === 'success') box.innerHTML = '✅ ' + msg;
            else if (type === 'error') box.innerHTML = '❌ ' + msg;
            else if (type === 'info') box.innerHTML = 'ℹ️ ' + msg;
        }

        function hideAlert() {
            const box = document.getElementById('alertBox');
            box.style.display = 'none';
            box.className = 'alert';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ============================================================
        //  بارگذاری اولیه
        // ============================================================
        loadSettings();
    </script>
</body>

</html>
